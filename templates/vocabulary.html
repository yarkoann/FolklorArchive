<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Словарь — ФонограммАрхив</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">Фоно<em>граф</em></div>
  <div class="topbar-sep"></div>
  <div class="topbar-page">Контролируемый словарь</div>
  <div class="topbar-right">
    <a href="/" class="btn btn-ghost btn-sm">← Архив</a>
  </div>
</div>

<div class="vocab-layout">

  <!-- SIDEBAR -->
  <nav class="vocab-sidebar">
    <div class="vs-label">Категории</div>
    <button class="vs-btn active" data-tab="ethnos"      style="--ac:var(--c-eth)"><span class="vs-dot" style="--ac:var(--c-eth)"></span>Этносы<span class="vs-cnt" id="nc-ethnos">0</span></button>
    <button class="vs-btn"        data-tab="genres"      style="--ac:var(--c-gen)"><span class="vs-dot" style="--ac:var(--c-gen)"></span>Жанры<span class="vs-cnt" id="nc-genres">0</span></button>
    <button class="vs-btn"        data-tab="locations"   style="--ac:var(--c-loc)"><span class="vs-dot" style="--ac:var(--c-loc)"></span>Локации<span class="vs-cnt" id="nc-locations">0</span></button>
    <button class="vs-btn"        data-tab="instruments" style="--ac:var(--c-ins)"><span class="vs-dot" style="--ac:var(--c-ins)"></span>Инструменты<span class="vs-cnt" id="nc-instruments">0</span></button>
    <button class="vs-btn"        data-tab="collections" style="--ac:var(--c-col)"><span class="vs-dot" style="--ac:var(--c-col)"></span>Коллекции<span class="vs-cnt" id="nc-collections">0</span></button>
    <button class="vs-btn"        data-tab="local_terms" style="--ac:var(--c-trm)"><span class="vs-dot" style="--ac:var(--c-trm)"></span>Местные термины<span class="vs-cnt" id="nc-local_terms">0</span></button>
  </nav>

  <main class="vocab-main">

    <!-- ЭТНОСЫ -->
    <div id="pane-ethnos" class="vocab-pane active" style="--ac:var(--c-eth)">
      <div class="vp-header">
        <div class="vp-title">Этносы</div>
        <span class="vp-cnt" id="pc-ethnos">0</span>
        <div style="margin-left:auto"><button class="btn btn-primary btn-sm" onclick="openAdd('ethnos')">+ Добавить этнос</button></div>
      </div>
      <div class="vocab-toolbar">
        <div class="vocab-search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="s-ethnos" placeholder="Поиск…" oninput="renderGrid('ethnos')"></div>
        <select class="vocab-sort" id="o-ethnos" onchange="renderGrid('ethnos')"><option value="az">А → Я</option><option value="za">Я → А</option></select>
      </div>
      <div class="vocab-grid" id="g-ethnos"></div>
    </div>

    <!-- ЖАНРЫ -->
    <div id="pane-genres" class="vocab-pane" style="--ac:var(--c-gen)">
      <div class="vp-header">
        <div class="vp-title">Жанры</div>
        <span class="vp-cnt" id="pc-genres">0</span>
        <div style="margin-left:auto"><button class="btn btn-primary btn-sm" onclick="openAdd('genres')">+ Добавить жанр</button></div>
      </div>
      <div class="vocab-toolbar">
        <div class="vocab-search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="s-genres" placeholder="Поиск…" oninput="renderGrid('genres')"></div>
        <select class="vocab-sort" id="o-genres" onchange="renderGrid('genres')"><option value="az">А → Я</option><option value="za">Я → А</option><option value="ritual">Ритуальные первыми</option></select>
      </div>
      <div class="vocab-grid" id="g-genres"></div>
    </div>

    <!-- ЛОКАЦИИ -->
    <div id="pane-locations" class="vocab-pane" style="--ac:var(--c-loc)">
      <div class="vp-header">
        <div class="vp-title">Локации</div>
        <span class="vp-cnt" id="pc-locations">0</span>
        <div style="margin-left:auto"><button class="btn btn-primary btn-sm" onclick="openAdd('locations')">+ Добавить локацию</button></div>
      </div>
      <div class="vocab-toolbar">
        <div class="vocab-search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="s-locations" placeholder="Поиск…" oninput="renderGrid('locations')"></div>
        <select class="vocab-sort" id="o-locations" onchange="renderGrid('locations')"><option value="az">А → Я</option><option value="za">Я → А</option><option value="type">По типу</option></select>
      </div>
      <div class="vocab-grid" id="g-locations"></div>
    </div>

    <!-- ИНСТРУМЕНТЫ -->
    <div id="pane-instruments" class="vocab-pane" style="--ac:var(--c-ins)">
      <div class="vp-header">
        <div class="vp-title">Инструменты</div>
        <span class="vp-cnt" id="pc-instruments">0</span>
        <div style="margin-left:auto"><button class="btn btn-primary btn-sm" onclick="openAdd('instruments')">+ Добавить инструмент</button></div>
      </div>
      <div class="vocab-toolbar">
        <div class="vocab-search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="s-instruments" placeholder="Поиск…" oninput="renderGrid('instruments')"></div>
        <select class="vocab-sort" id="o-instruments" onchange="renderGrid('instruments')"><option value="az">А → Я</option><option value="za">Я → А</option><option value="type">По типу</option></select>
      </div>
      <div class="vocab-grid" id="g-instruments"></div>
    </div>

    <!-- КОЛЛЕКЦИИ -->
    <div id="pane-collections" class="vocab-pane" style="--ac:var(--c-col)">
      <div class="vp-header">
        <div class="vp-title">Коллекции</div>
        <span class="vp-cnt" id="pc-collections">0</span>
        <div style="margin-left:auto"><button class="btn btn-primary btn-sm" onclick="openAdd('collections')">+ Добавить коллекцию</button></div>
      </div>
      <div class="vocab-toolbar">
        <div class="vocab-search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="s-collections" placeholder="Поиск…" oninput="renderGrid('collections')"></div>
        <select class="vocab-sort" id="o-collections" onchange="renderGrid('collections')"><option value="az">А → Я</option><option value="za">Я → А</option></select>
      </div>
      <div class="vocab-grid" id="g-collections"></div>
    </div>

    <!-- МЕСТНЫЕ ТЕРМИНЫ -->
    <div id="pane-local_terms" class="vocab-pane" style="--ac:var(--c-trm)">
      <div class="vp-header">
        <div class="vp-title">Местные термины</div>
        <span class="vp-cnt" id="pc-local_terms">0 терминов</span>
        <div style="margin-left:auto;font-size:12px;color:var(--muted)">Термины из записей архива</div>
      </div>
      <div class="vocab-toolbar">
        <div class="vocab-search"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="s-local_terms" placeholder="Поиск термина…" oninput="filterLocalTerms()"></div>
        <select class="vocab-sort" id="o-local_terms" onchange="renderLocalTerms()"><option value="az">А → Я</option><option value="za">Я → А</option><option value="freq">По частоте</option></select>
      </div>
      <div id="g-local_terms" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>

  </main>
</div>

<!-- MODAL ADD/EDIT -->
<div class="modal-backdrop" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Добавить</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="modal-backdrop" id="confirm" style="display:none">
  <div class="confirm-box">
    <span class="ci">🗑</span>
    <h3>Удалить элемент?</h3>
    <p id="confirm-text">Это действие нельзя отменить.</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="document.getElementById('confirm').style.display='none'">Отмена</button>
      <button class="btn btn-danger" id="confirm-yes">Удалить</button>
    </div>
  </div>
</div>

<div class="toast-area" id="toast-area"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const CATS  = ['ethnos','genres','locations','instruments','collections'];
const ICONS = {ethnos:'🌍',genres:'🎵',locations:'📍',instruments:'🎸',collections:'📀',local_terms:'📘'};
const TYPE_NAMES = {
  region:'Регион',city:'Город',settlement:'Населённый пункт',other:'Другое',
  idiophone:'Идиофон',membranophone:'Мембранофон',chordophone:'Хордофон',
  aerophone:'Аэрофон',electrophone:'Электрофон'
};
const FIELD_DEFS = {
  ethnos: [
    {k:'name',   lbl:'Название *',  type:'text', req:true,  ph:'Например: Ненцы'},
    {k:'region', lbl:'Регион',      type:'text', ph:'Например: Ямало-Ненецкий АО'},
  ],
  genres: [
    {k:'name',   lbl:'Название *',  type:'text', req:true,  ph:'Например: Горловое пение'},
    {k:'ritual', lbl:'Ритуальный',  type:'toggle'},
  ],
  locations: [
    {k:'name', lbl:'Название *', type:'text', req:true, ph:'Например: Нарьян-Мар'},
    {k:'type', lbl:'Тип',        type:'select', opts:[['region','Регион'],['city','Город'],['settlement','Населённый пункт'],['other','Другое']]},
  ],
  instruments: [
    {k:'name', lbl:'Название *',        type:'text', req:true, ph:'Например: Варган'},
    {k:'type', lbl:'Тип инструмента',   type:'select', opts:[['idiophone','Идиофон'],['membranophone','Мембранофон'],['chordophone','Хордофон'],['aerophone','Аэрофон'],['electrophone','Электрофон'],['other','Другое']]},
  ],
  collections: [
    {k:'name', lbl:'Название *', type:'text', req:true, ph:'Например: Диск №100'},
  ],
};

let DATA = {ethnos:[],genres:[],locations:[],instruments:[],collections:[]};
let LOCAL_TERMS = [];
let currentTab = 'ethnos';

// ── INIT ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await reloadAll();
  document.querySelectorAll('.vs-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.vs-btn').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.vocab-pane').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentTab = b.dataset.tab;
      document.getElementById('pane-' + currentTab).classList.add('active');
      if (currentTab === 'local_terms') renderLocalTerms();
      else renderGrid(currentTab);
    });
  });
});

async function reloadAll() {
  await Promise.all([
    ...CATS.map(async c => {
      const r = await fetch('/api/vocabulary/' + c).catch(() => ({json:()=>[]}));
      DATA[c] = await r.json().catch(() => []);
      const n = DATA[c].length;
      const nc = document.getElementById('nc-' + c);
      const pc = document.getElementById('pc-' + c);
      if (nc) nc.textContent = n;
      if (pc) pc.textContent = n + ' ' + plu(n,'элемент','элемента','элементов');
    }),
    loadLocalTerms(),
  ]);
  renderGrid(currentTab === 'local_terms' ? 'ethnos' : currentTab);
  if (currentTab === 'local_terms') renderLocalTerms();
  else renderGrid(currentTab);
}

async function loadLocalTerms() {
  const r = await fetch('/api/local_terms_all').catch(() => ({json:()=>[]}));
  LOCAL_TERMS = await r.json().catch(() => []);
  const n = LOCAL_TERMS.length;
  const nc = document.getElementById('nc-local_terms');
  const pc = document.getElementById('pc-local_terms');
  if (nc) nc.textContent = n;
  if (pc) pc.textContent = n + ' ' + plu(n,'термин','термина','терминов');
}

// ── GRID RENDER ───────────────────────────────────────────────────
function renderGrid(tab) {
  if (tab === 'local_terms') { renderLocalTerms(); return; }
  const grid = document.getElementById('g-' + tab);
  const q    = (document.getElementById('s-' + tab)||{}).value || '';
  const ord  = (document.getElementById('o-' + tab)||{}).value || 'az';
  let items  = [...(DATA[tab]||[])].filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
  if (ord === 'az')     items.sort((a,b) => a.name.localeCompare(b.name, 'ru'));
  else if (ord === 'za') items.sort((a,b) => b.name.localeCompare(a.name, 'ru'));
  else if (ord === 'ritual') items.sort((a,b) => (b.ritual?1:0) - (a.ritual?1:0));
  else if (ord === 'type')   items.sort((a,b) => (a.type||'').localeCompare(b.type||''));

  if (!items.length) {
    grid.innerHTML = `<div class="vc-empty"><span class="ei">${ICONS[tab]}</span><h3>Нет элементов</h3><p>${q?'Ничего по «'+esc(q)+'»':'Список пуст'}</p></div>`;
    return;
  }
  grid.innerHTML = items.map(item => cardHtml(tab, item)).join('');
}

function cardHtml(tab, item) {
  let chips = '', termsHtml = '';

  if (tab === 'ethnos') {
    if (item.region) chips += `<span class="chip chip-neutral">${esc(item.region)}</span>`;
    termsHtml = termsBlock(tab, item, 'alternative_names', 'Альт. названия', item.alternative_names||[]);
  } else if (tab === 'genres') {
    chips += `<span class="chip ${item.ritual?'chip-red':'chip-green'}">${item.ritual?'Ритуальный':'Светский'}</span>`;
    termsHtml = termsBlock(tab, item, 'local_terms', 'Локальные термины', item.local_terms||[]);
  } else if (tab === 'locations') {
    if (item.type) chips += `<span class="chip chip-neutral">${TYPE_NAMES[item.type]||item.type}</span>`;
  } else if (tab === 'instruments') {
    if (item.type) chips += `<span class="chip chip-amber">${TYPE_NAMES[item.type]||item.type}</span>`;
    termsHtml = termsBlock(tab, item, 'local_names', 'Лок. названия', item.local_names||[]);
  }

  return `<div class="vc" id="vc-${tab}-${item.id}" style="--ac:var(--c-${tabAc(tab)})">
    <div class="vc-head">
      <div class="vc-icon">${ICONS[tab]}</div>
      <div class="vc-info">
        <div class="vc-name" title="${esc(item.name)}">${esc(item.name)}</div>
        <div class="vc-id">${esc(item.id||'')}</div>
      </div>
    </div>
    ${chips ? `<div class="vc-chips">${chips}</div>` : ''}
    ${termsHtml}
    <div class="vc-actions">
      <button class="btn btn-ghost btn-sm" onclick="openEdit('${tab}','${item.id}')">✏️ Изменить</button>
      <button class="btn btn-danger btn-sm" onclick="askDelete('${tab}','${item.id}','${esc(item.name)}')">🗑 Удалить</button>
    </div>
  </div>`;
}

function termsBlock(tab, item, field, label, terms) {
  const pills = terms.map(t =>
    `<span class="vc-pill">${esc(t)}<button title="Удалить" onclick="doRemoveTerm('${tab}','${item.id}','${field}','${esc(t)}')">✕</button></span>`
  ).join('');
  const iid = `at-${tab}-${item.id}-${field}`;
  return `<div class="vc-terms">
    <div class="vc-terms-lbl">${label}</div>
    <div class="vc-pills">${pills || '<span style="font-size:11px;color:var(--muted)">—</span>'}</div>
    <div class="vc-add-term">
      <input type="text" id="${iid}" placeholder="Добавить…" onkeydown="if(event.key==='Enter') doAddTerm('${tab}','${item.id}','${field}','${iid}')">
      <button onclick="doAddTerm('${tab}','${item.id}','${field}','${iid}')">+ Добавить</button>
    </div>
  </div>`;
}

// ── LOCAL TERMS ───────────────────────────────────────────────────
function filterLocalTerms() { renderLocalTerms(); }

function renderLocalTerms() {
  const q   = (document.getElementById('s-local_terms')||{}).value || '';
  const ord = (document.getElementById('o-local_terms')||{}).value || 'az';
  let items = [...LOCAL_TERMS].filter(i => i.term.toLowerCase().includes(q.toLowerCase()));
  if (ord === 'az')   items.sort((a,b) => a.term.localeCompare(b.term, 'ru'));
  else if (ord === 'za')   items.sort((a,b) => b.term.localeCompare(a.term, 'ru'));
  else if (ord === 'freq') items.sort((a,b) => (b.recordings||[]).length - (a.recordings||[]).length);

  const container = document.getElementById('g-local_terms');
  if (!items.length) {
    container.innerHTML = `<div class="vc-empty"><span class="ei">📘</span><h3>Нет терминов</h3><p>${q?'Ничего по «'+esc(q)+'»':'В записях нет местных терминов'}</p></div>`;
    return;
  }
  container.innerHTML = items.map(item => ltItemHtml(item)).join('');
}

function ltItemHtml(item) {
  const term = item.term;
  const key  = term.toLowerCase();
  const alts = item.alt_names || [];
  const recs = item.recordings || [];
  const iid  = `lt-add-${key.replace(/[^a-z0-9]/g,'_')}`;

  const altPills = alts.map(a =>
    `<span class="vc-pill" style="--ac:var(--c-trm)">${esc(a)}<button title="Удалить" onclick="ltRemoveAlt('${esc(term)}','${esc(a)}')">✕</button></span>`
  ).join('');

  const recLinks = recs.map(r =>
    `<a href="/recording/${r.id}" class="chip chip-neutral" style="text-decoration:none;font-size:11px">${esc(r.title||r.id)}</a>`
  ).join(' ');

  return `<div class="lt-item">
    <div class="lt-icon">📘</div>
    <div class="lt-body">
      <div class="lt-term">${esc(term)}</div>
      ${recs.length ? `<div class="lt-parent" style="margin-bottom:6px">Встречается в: ${recLinks}</div>` : ''}
      <div class="vc-terms-lbl" style="margin-bottom:5px">Альтернативные названия</div>
      <div class="lt-alts">${altPills || '<span style="font-size:11px;color:var(--muted)">—</span>'}</div>
      <div class="lt-add">
        <input type="text" id="${iid}" placeholder="Добавить альтернативное название…"
               onkeydown="if(event.key==='Enter') ltAddAlt('${esc(term)}','${iid}')">
        <button class="btn btn-add-new" onclick="ltAddAlt('${esc(term)}','${iid}')">+ Добавить</button>
      </div>
    </div>
    <div class="lt-actions">
      <button class="btn btn-ghost btn-sm" onclick="ltEdit('${esc(term)}')" title="Редактировать">✏️</button>
    </div>
  </div>`;
}

async function ltAddAlt(term, inputId) {
  const el  = document.getElementById(inputId);
  const alt = el?.value?.trim();
  if (!alt) return;
  const item = LOCAL_TERMS.find(i => i.term === term);
  if (!item) return;
  const newAlts = [...(item.alt_names||[])];
  if (!newAlts.includes(alt)) newAlts.push(alt);
  try {
    const r = await fetch('/api/local_terms_meta/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({term, alt_names: newAlts})
    });
    const j = await r.json();
    if (j.status === 'success') {
      if (el) el.value = '';
      await loadLocalTerms(); renderLocalTerms(); toast('Добавлено');
    } else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка сервера','err'); }
}

async function ltRemoveAlt(term, alt) {
  const item = LOCAL_TERMS.find(i => i.term === term);
  if (!item) return;
  const newAlts = (item.alt_names||[]).filter(a => a !== alt);
  try {
    const r = await fetch('/api/local_terms_meta/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({term, alt_names: newAlts})
    });
    const j = await r.json();
    if (j.status === 'success') {
      await loadLocalTerms(); renderLocalTerms(); toast('Удалено');
    } else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка','err'); }
}

function ltEdit(term) {
  const item = LOCAL_TERMS.find(i => i.term === term) || {term, alt_names:[]};
  document.getElementById('modal-title').textContent = 'Термин: ' + term;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r-sm)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">ТЕРМИН</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700">${esc(term)}</div>
    </div>
    <div class="modal-field">
      <label>Альтернативные названия (через запятую)</label>
      <input type="text" id="mf-lt-alts" value="${esc((item.alt_names||[]).join(', '))}" placeholder="напр.: экоот, іюіу">
      <span class="form-hint">Разные написания, переводы, транслитерации этого термина</span>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    <button class="btn btn-success" onclick="ltSaveEdit('${esc(term)}')">💾 Сохранить</button>`;
  document.getElementById('modal').style.display = 'flex';
}

async function ltSaveEdit(term) {
  const raw  = document.getElementById('mf-lt-alts')?.value || '';
  const alts = raw.split(',').map(s => s.trim()).filter(Boolean);
  try {
    const r = await fetch('/api/local_terms_meta/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({term, alt_names: alts})
    });
    const j = await r.json();
    if (j.status === 'success') {
      closeModal(); await loadLocalTerms(); renderLocalTerms(); toast('Сохранено');
    } else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка','err'); }
}

// ── ADD / EDIT MODAL ──────────────────────────────────────────────
function buildForm(tab, data) {
  return (FIELD_DEFS[tab]||[]).map(f => {
    const val = data ? (data[f.k] ?? '') : '';
    if (f.type === 'text') {
      return `<div class="modal-field"><label>${f.lbl}</label>
        <input type="text" id="mf-${f.k}" value="${esc(String(val))}" placeholder="${f.ph||''}" ${f.req?'required':''}>
        </div>`;
    }
    if (f.type === 'select') {
      const opts = f.opts.map(([v,l]) => `<option value="${v}" ${val===v?'selected':''}>${l}</option>`).join('');
      return `<div class="modal-field"><label>${f.lbl}</label><select id="mf-${f.k}">${opts}</select></div>`;
    }
    if (f.type === 'toggle') {
      return `<div class="modal-field"><label>${f.lbl}</label>
        <div class="toggle-wrap">
          <label class="toggle"><input type="checkbox" id="mf-${f.k}" ${val?'checked':''}><span class="toggle-slider"></span></label>
          <span class="toggle-label">${val ? 'Да' : 'Нет'}</span>
        </div></div>`;
    }
    return '';
  }).join('');
}

function getFormData(tab) {
  const result = {};
  for (const f of (FIELD_DEFS[tab]||[])) {
    const el = document.getElementById('mf-' + f.k);
    if (!el) continue;
    result[f.k] = f.type === 'toggle' ? el.checked : el.value.trim();
  }
  return result;
}

function openAdd(tab) {
  document.getElementById('modal-title').textContent = 'Добавить: ' + tabLabel(tab);
  document.getElementById('modal-body').innerHTML = buildForm(tab, null);
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    <button class="btn btn-success" onclick="doAdd('${tab}')">💾 Добавить</button>`;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.querySelector('.modal-box input')?.focus(), 60);
}

function openEdit(tab, id) {
  const item = (DATA[tab]||[]).find(i => i.id === id);
  if (!item) return;
  document.getElementById('modal-title').textContent = 'Изменить: ' + item.name;
  document.getElementById('modal-body').innerHTML = buildForm(tab, item);
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    <button class="btn btn-success" onclick="doEdit('${tab}','${id}')">💾 Сохранить</button>`;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.querySelector('.modal-box input')?.focus(), 60);
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function doAdd(tab) {
  const fd = getFormData(tab);
  if (!fd.name) { toast('Введите название','err'); return; }
  try {
    const r = await fetch(`/api/vocabulary/${tab}/add_item`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(fd)
    });
    const j = await r.json();
    if (j.status === 'success') { closeModal(); await reloadAll(); toast('Добавлено'); }
    else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка сервера','err'); }
}

async function doEdit(tab, id) {
  const fd = getFormData(tab);
  if (!fd.name) { toast('Название не может быть пустым','err'); return; }
  try {
    const r = await fetch(`/api/vocabulary/${tab}/update`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, updates:fd})
    });
    const j = await r.json();
    if (j.status === 'success') { closeModal(); await reloadAll(); toast('Сохранено'); }
    else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка сервера','err'); }
}

// ── DELETE ────────────────────────────────────────────────────────
function askDelete(tab, id, name) {
  document.getElementById('confirm-text').textContent = `«${name}» будет удалён из словаря. Записи с этим значением не изменятся.`;
  document.getElementById('confirm').style.display = 'flex';
  document.getElementById('confirm-yes').onclick = () => doDelete(tab, id);
}

async function doDelete(tab, id) {
  document.getElementById('confirm').style.display = 'none';
  try {
    const r = await fetch(`/api/vocabulary/${tab}/delete`, {
      method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})
    });
    const j = await r.json();
    if (j.status === 'success') { await reloadAll(); toast('Удалено'); }
    else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка сервера','err'); }
}

// ── TERMS ─────────────────────────────────────────────────────────
async function doAddTerm(tab, id, field, inputId) {
  const el = document.getElementById(inputId);
  const term = el?.value?.trim();
  if (!term) return;
  try {
    const r = await fetch(`/api/vocabulary/${tab}/add_term`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id,field,term})
    });
    const j = await r.json();
    if (j.status === 'success') { if (el) el.value=''; await reloadAll(); toast('Добавлено'); }
    else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка','err'); }
}

async function doRemoveTerm(tab, id, field, term) {
  try {
    const r = await fetch(`/api/vocabulary/${tab}/remove_term`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id,field,term})
    });
    const j = await r.json();
    if (j.status === 'success') { await reloadAll(); toast('Удалено'); }
    else toast(j.message||'Ошибка','err');
  } catch(e) { toast('Ошибка','err'); }
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const area = document.getElementById('toast-area');
  const el   = document.createElement('div');
  el.className = `toast-item t-${type}`;
  el.textContent = (type==='ok' ? '✓ ' : '✕ ') + msg;
  area.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 2600);
}

// ── UTILS ─────────────────────────────────────────────────────────
function esc(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function tabLabel(t) { return {ethnos:'этнос',genres:'жанр',locations:'локацию',instruments:'инструмент',collections:'коллекцию'}[t]||t; }
function tabAc(t)    { return {ethnos:'eth',genres:'gen',locations:'loc',instruments:'ins',collections:'col'}[t]||'eth'; }
function plu(n,a,b,c){ const m=Math.abs(n)%100,n1=m%10; if(m>10&&m<20)return c; if(n1>1&&n1<5)return b; if(n1===1)return a; return c; }
