<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детальная информация - Фольклорный архив</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="detail-container">
    <div class="detail-header">
        <a href="/" class="back-link">← На главную</a>
        <h1>Детальная информация</h1>
        <p>ID записи: <span id="recording-id-display"></span></p>
    </div>

    <div class="detail-content" id="recording-detail">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Загрузка данных...</p>
        </div>
    </div>

    <div id="detail-actions-container"></div>

    <a href="/" class="back-button">← Вернуться к поиску</a>
</div>

<script>
    const pathParts = window.location.pathname.split('/');
    const recordingId = pathParts[pathParts.length - 1];

    document.getElementById('recording-id-display').textContent = recordingId;

    async function loadRecordingDetails() {
        try {
            const response = await fetch(`/api/recording/${recordingId}`);
            if (!response.ok) throw new Error(`HTTP ошибка! статус: ${response.status}`);
            const data = await response.json();
            if (data.error) {
                showError(data.error);
                return;
            }
            displayRecordingDetails(data);
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            showError(error.message);
        }
    }

    function displayRecordingDetails(recording) {
        const statusClass = getStatusClass(recording.status);
        const statusName = getStatusName(recording.status);
        const durationDisplay = recording.duration || 'Не указана';
        const localTermsDisplay = recording.local_terms ?
            (Array.isArray(recording.local_terms) ? recording.local_terms.join(', ') : recording.local_terms) : 'Не указаны';

        // Форма исполнения для отображения
        const performanceFormMap = {
            'vocal': 'Вокальная',
            'instrumental': 'Инструментальная',
            'vocal_instrumental': 'Вокально-инструментальная'
        };

        // Построение таблицы исполнителей с инструментами
        let performersRowsHtml = '';
        if (recording.performers && recording.performers.length > 0) {
            for (let i = 0; i < recording.performers.length; i++) {
                const performer = recording.performers[i];
                const performanceForm = performanceFormMap[performer.performance_form] || performer.performance_form || 'Не указана';

                // Формируем строку с инструментами
                let instrumentsText = '';
                if (performer.instruments && performer.instruments.length > 0) {
                    instrumentsText = performer.instruments.map(inst => inst.name).join(', ');
                } else {
                    instrumentsText = 'Не указаны';
                }

                performersRowsHtml += `
                        <tr>
                            <th>${recording.performers.length > 1 ? `Исполнитель ${i + 1}:` : 'Исполнитель:'}</th>
                            <td>
                                <strong>${escapeHtml(performer.name || 'Не указан')}</strong>
                                ${performer.ethnos ? `<span style="color: #666;"> (${escapeHtml(performer.ethnos)})</span>` : ''}
                            </td>
                        </tr>
                        <tr>
                            <th>Форма исполнения:</th>
                            <td>${escapeHtml(performanceForm)}</td>
                        </tr>
                        ${performer.instruments && performer.instruments.length > 0 ? `
                        <tr>
                            <th>Инструменты:</th>
                            <td>${escapeHtml(instrumentsText)}</td>
                        </tr>
                        ` : ''}
                        ${i < recording.performers.length - 1 ? '<tr><td colspan="2" style="padding: 5px;"></td></tr>' : ''}
                    `;
            }
        } else if (recording.performer) {
            // Старый формат
            performersRowsHtml = `
                    <tr>
                        <th>Исполнитель:</th>
                        <td>
                            <strong>${escapeHtml(recording.performer)}</strong>
                            ${recording.ethnos ? `<span style="color: #666;"> (${escapeHtml(recording.ethnos)})</span>` : ''}
                        </td>
                    </tr>
                `;
        } else {
            performersRowsHtml = `
                    <tr>
                        <th>Исполнитель:</th>
                        <td>Не указан</td>
                    </tr>
                `;
        }


        const mainHtml = `
                <!-- ОСНОВНАЯ ИНФОРМАЦИЯ -->
                <div class="detail-section">
                    <h3>Основная информация</h3>
                    <table class="detail-table">
                        <tr><th>Название:</th><td>${escapeHtml(recording.title || 'Не указано')}</td></tr>
                        <tr><th>Инвентарный номер:</th><td>${escapeHtml(recording.inventory_number || 'Не указан')}</td></tr>
                        <tr><th>Дата записи:</th><td>${escapeHtml(recording.date || 'Не указана')}</td></tr>
                        <tr><th>Длительность:</th><td>${durationDisplay}</td></tr>

                    </table>
                </div>

                <!-- ИСПОЛНИТЕЛИ -->
                <div class="detail-section">
                    <h3>Исполнители</h3>
                    <table class="detail-table">
                        ${performersRowsHtml}
                    </table>
                </div>



                <!-- КЛАССИФИКАЦИЯ -->
                <div class="detail-section">
                    <h3>Классификация</h3>
                    <table class="detail-table">
                        <tr><th>Жанр:</th><td>${escapeHtml(recording.genre || 'Не указан')}</td></tr>
                        <tr><th>Локация:</th><td>${escapeHtml(recording.location || 'Не указана')}</td></tr>
                        <tr><th>Коллекция:</th><td>${escapeHtml(recording.collection || 'Не указана')}</td></tr>
                        <tr><th>Этический статус:</th><td><span class="status-badge ${statusClass}">${statusName}</span></td></tr>
                    </table>
                </div>

                <div class="detail-section">
                    <h3>Местные термины</h3>
                    <table class="detail-table"><tr><th>Термины:</th><td>${escapeHtml(localTermsDisplay)}</td></tr></table>
                </div>

                <div class="detail-section">
                    <h3>Описание</h3>
                    <table class="detail-table"><tr><th>Описание:</th><td>${escapeHtml(recording.description || 'Нет описания')}</td></tr></table>
                </div>




            `;

        document.getElementById('recording-detail').innerHTML = mainHtml;

        const actionsContainer = document.getElementById('detail-actions-container');
        actionsContainer.innerHTML = `
                <div class="detail-actions">
                    <button onclick="location.href='/edit_recording/${recordingId}'" class="btn-warning">✏️ Редактировать</button>
                    <button onclick="deleteRecording()" class="btn-danger">🗑️ Удалить</button>
                </div>
            `;
    }

    function showError(message) {
        const html = `
                <div class="error">
                    <h3>❌ Ошибка при загрузке данных</h3>
                    <p>${escapeHtml(message)}</p>
                    <p>Пожалуйста, попробуйте вернуться на главную страницу и выбрать другую запись.</p>
                </div>
            `;
        document.getElementById('recording-detail').innerHTML = html;
        document.getElementById('detail-actions-container').innerHTML = '';
    }

    function deleteRecording() {
        if (confirm('Вы уверены, что хотите удалить эту запись? Это действие нельзя отменить.')) {
            fetch(`/api/delete_recording/${recordingId}`, {method: 'DELETE'})
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Запись успешно удалена');
                        window.location.href = '/';
                    } else {
                        alert('Ошибка при удалении: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Произошла ошибка при удалении');
                });
        }
    }

    function getStatusClass(status) {
        if (!status) return 'status-public';
        if (status.includes('публичный')) return 'status-public';
        if (status.includes('ограниченный')) return 'status-restricted';
        if (status.includes('согласия')) return 'status-community';
        return 'status-public';
    }

    function getStatusName(status) {
        if (!status) return 'Публичный доступ';
        if (status.includes('публичный')) return 'Публичный доступ';
        if (status.includes('ограниченный')) return 'Ограниченный доступ';
        if (status.includes('согласия')) return 'Требует согласия общины';
        return status;
    }

    function escapeHtml(text) {
        if (!text) return '';
        if (typeof text !== 'string') text = String(text);
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    loadRecordingDetails();
</script>
</body>
</html>
