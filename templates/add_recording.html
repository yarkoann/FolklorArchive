<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление записи - ФонограммАрхив</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <div class="topbar-logo">Фоно<em>граф</em></div>
    <div class="topbar-sep"></div>
    <div class="topbar-page">Новая запись</div>
    <div class="topbar-right">
        <a href="/" class="btn btn-ghost btn-sm">← Архив</a>
        <a href="/vocabulary" class="btn btn-ghost btn-sm">📚 Словарь</a>
    </div>
</div>

<div class="page-container">
    <div class="page-hero">
        <a href="/" class="back-link">← На главную</a>
        <h1>Новая запись</h1>
    </div>

    <form id="add-recording-form" class="recording-form">
        <div class="form-section">
            <h3>Основная информация</h3>
            <div class="form-group">
                <label for="title">Название записи *</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="inventory_number">Инвентарный номер</label>
                    <input type="text" id="inventory_number" name="inventory_number" placeholder="Например: NG-2023-001">
                </div>
                <div class="form-group">
                    <label for="recording_date">Дата записи</label>
                    <input type="date" id="recording_date" name="recording_date">
                </div>
            </div>
            <div class="form-group">
                <label>Длительность</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="duration_hours" placeholder="Часы" min="0" max="99" value="0" style="width: 80px; padding: 10px;">
                    <span>:</span>
                    <input type="number" id="duration_minutes" placeholder="Минуты" min="0" max="59" value="0" style="width: 80px; padding: 10px;">
                    <span>:</span>
                    <input type="number" id="duration_seconds" placeholder="Секунды" min="0" max="59" value="0" style="width: 80px; padding: 10px;">
                </div>
                <input type="hidden" id="duration" name="duration">
                <small class="form-hint">Введите часы, минуты и секунды</small>
            </div>
        </div>

        <div class="form-section">
            <h3>Информация об исполнителях</h3>
            <div id="performers-container"></div>
            <button type="button" onclick="addPerformer()" class="btn-add">+ Добавить еще исполнителя</button>
        </div>

        <div class="form-section">
            <h3>Классификация</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="genre">Жанр</label>
                    <select id="genre" name="genre">
                        <option value="">Выберите жанр</option>
                    </select>
                    <div id="new-genre-container" style="display: none;" class="new-item-input">
                        <input type="text" id="new-genre" placeholder="Введите название нового жанра">
                        <button type="button" onclick="addNewItem('genres', 'new-genre', 'genre')" class="btn-add-new">Добавить жанр</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="ethical_status">Этический статус *</label>
                    <select id="ethical_status" name="ethical_status" required>
                        <option value="">Выберите уровень доступа</option>
                        <option value="публичный_доступ">Публичный доступ</option>
                        <option value="ограниченный_доступ">Ограниченный доступ</option>
                        <option value="требует_согласия_общины">Требует согласия общины</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="location">Локация</label>
                    <select id="location" name="location">
                        <option value="">Выберите локацию</option>
                    </select>
                    <div id="new-location-container" style="display: none;" class="new-item-input">
                        <input type="text" id="new-location" placeholder="Введите название новой локации">
                        <button type="button" onclick="addNewItem('locations', 'new-location', 'location')" class="btn-add-new">Добавить локацию</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="collection">Коллекция</label>
                    <select id="collection" name="collection">
                        <option value="">Выберите коллекцию</option>
                    </select>
                    <div id="new-collection-container" style="display: none;" class="new-item-input">
                        <input type="text" id="new-collection" placeholder="Введите название новой коллекции">
                        <button type="button" onclick="addNewItem('collections', 'new-collection', 'collection')" class="btn-add-new">Добавить коллекцию</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Местные термины</h3>
            <div class="form-group">
                <label for="local_terms">Местные термины</label>
                <input type="text" id="local_terms" name="local_terms" placeholder="Например: пилгэйнгэн, мәнә бәлы, ситабы">
                <small class="form-hint">Введите термины через запятую</small>
            </div>
        </div>

        <div class="form-section">
            <h3>Описание</h3>
            <div class="form-group">
                <textarea id="description" name="description" rows="4"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">💾 Сохранить запись</button>
            <a href="/" class="btn-secondary" style="text-decoration: none; display: inline-flex; padding: 9px 18px;">Отмена</a>
        </div>
    </form>
</div>

<div class="toast-area" id="toast-area"></div>

<script>
    let vocabularyData = {
        genres: [],
        locations: [],
        collections: [],
        ethnos: [],
        instruments: []
    };
    let performerCounter = 0;

    function toast(msg, type = 'ok') {
        const area = document.getElementById('toast-area');
        const el = document.createElement('div');
        el.className = `toast-item t-${type}`;
        el.textContent = (type === 'ok' ? '✓ ' : '✕ ') + msg;
        area.appendChild(el);
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
        setTimeout(() => {
            el.classList.remove('show');
            setTimeout(() => el.remove(), 400);
        }, 2800);
    }

    document.addEventListener('DOMContentLoaded', async function() {
        await loadAllVocabulary();
        addPerformer();
        setupDurationListener();
        setupEventListeners();
    });

    function setupDurationListener() {
        function updateDuration() {
            const hours = document.getElementById('duration_hours').value || 0;
            const minutes = document.getElementById('duration_minutes').value || 0;
            const seconds = document.getElementById('duration_seconds').value || 0;
            let durationStr = '';
            if (parseInt(hours) > 0) {
                durationStr = `${String(parseInt(hours)).padStart(2, '0')}:${String(parseInt(minutes)).padStart(2, '0')}:${String(parseInt(seconds)).padStart(2, '0')}`;
            } else {
                durationStr = `${String(parseInt(minutes)).padStart(2, '0')}:${String(parseInt(seconds)).padStart(2, '0')}`;
            }
            const durationField = document.getElementById('duration');
            if (durationField) durationField.value = durationStr;
        }
        const hoursField = document.getElementById('duration_hours');
        const minutesField = document.getElementById('duration_minutes');
        const secondsField = document.getElementById('duration_seconds');
        if (hoursField) hoursField.addEventListener('input', updateDuration);
        if (minutesField) minutesField.addEventListener('input', updateDuration);
        if (secondsField) secondsField.addEventListener('input', updateDuration);
        updateDuration();
    }

    async function loadAllVocabulary() {
        try {
            const [genres, locations, collections, ethnos, instruments] = await Promise.all([
                fetch('/api/vocabulary/genres').then(r => r.json()),
                fetch('/api/vocabulary/locations').then(r => r.json()),
                fetch('/api/vocabulary/collections').then(r => r.json()),
                fetch('/api/vocabulary/ethnos').then(r => r.json()),
                fetch('/api/vocabulary/instruments').then(r => r.json()).catch(() => [])
            ]);
            vocabularyData = {
                genres: genres || [],
                locations: locations || [],
                collections: collections || [],
                ethnos: ethnos || [],
                instruments: instruments || []
            };
            updateSelects();
        } catch (error) {
            console.error('Ошибка загрузки словарей:', error);
            toast('Ошибка загрузки словарей', 'err');
        }
    }

    function updateSelects() {
        updateSelect('genre', vocabularyData.genres);
        updateSelect('location', vocabularyData.locations);
        updateSelect('collection', vocabularyData.collections);
    }

    function updateSelect(selectId, items) {
        const select = document.getElementById(selectId);
        if (!select) return;
        const currentValue = select.value;
        while (select.options.length > 1) select.remove(1);
        items.forEach(item => {
            const option = document.createElement('option');
            option.value = item.name;
            option.textContent = item.name;
            select.appendChild(option);
        });
        const newOption = document.createElement('option');
        newOption.value = 'new';
        newOption.textContent = '➕ Создать новый...';
        select.appendChild(newOption);
        if (currentValue && currentValue !== 'new') select.value = currentValue;
    }

    function updateEthnosSelect(select) {
        const currentValue = select.value;
        while (select.options.length > 1) select.remove(1);
        vocabularyData.ethnos.forEach(item => {
            const option = document.createElement('option');
            option.value = item.name;
            option.textContent = item.name;
            select.appendChild(option);
        });
        const newOption = document.createElement('option');
        newOption.value = 'new';
        newOption.textContent = '➕ Создать новый...';
        select.appendChild(newOption);
        if (currentValue && currentValue !== 'new') select.value = currentValue;
    }

    function updateInstrumentSelect(select) {
        const currentValue = select.value;
        while (select.options.length > 1) select.remove(1);
        vocabularyData.instruments.forEach(item => {
            const option = document.createElement('option');
            option.value = item.name;
            option.textContent = item.name;
            select.appendChild(option);
        });
        const newOption = document.createElement('option');
        newOption.value = 'new';
        newOption.textContent = '➕ Создать новый...';
        select.appendChild(newOption);
        if (currentValue && currentValue !== 'new') select.value = currentValue;
    }

    function refreshAllInstrumentSelects() {
        document.querySelectorAll('.instrument-select').forEach(select => {
            const currentVal = select.value;
            updateInstrumentSelect(select);
            if (currentVal && currentVal !== 'new') select.value = currentVal;
        });
    }

    function setupEventListeners() {
        const genreSelect = document.getElementById('genre');
        if (genreSelect) {
            genreSelect.addEventListener('change', function(e) {
                const container = document.getElementById('new-genre-container');
                if (container) container.style.display = e.target.value === 'new' ? 'flex' : 'none';
            });
        }
        const locationSelect = document.getElementById('location');
        if (locationSelect) {
            locationSelect.addEventListener('change', function(e) {
                const container = document.getElementById('new-location-container');
                if (container) container.style.display = e.target.value === 'new' ? 'flex' : 'none';
            });
        }
        const collectionSelect = document.getElementById('collection');
        if (collectionSelect) {
            collectionSelect.addEventListener('change', function(e) {
                const container = document.getElementById('new-collection-container');
                if (container) container.style.display = e.target.value === 'new' ? 'flex' : 'none';
            });
        }
    }

    async function addNewItem(category, inputId, selectId) {
        const input = document.getElementById(inputId);
        const name = input.value.trim();
        if (!name) {
            toast('Введите название', 'err');
            return;
        }
        try {
            const response = await fetch('/api/add_to_vocabulary', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({category, name})
            });
            const result = await response.json();
            if (result.status === 'success') {
                vocabularyData[category].push({name});
                updateSelect(selectId, vocabularyData[category]);
                document.getElementById(selectId).value = name;
                document.getElementById(inputId + '-container').style.display = 'none';
                input.value = '';
                toast(`✅ Добавлен новый ${category}: ${name}`, 'ok');
            } else {
                toast('Ошибка при добавлении: ' + (result.error || 'Неизвестная ошибка'), 'err');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            toast('Произошла ошибка при добавлении', 'err');
        }
    }

    function addPerformer() {
        const container = document.getElementById('performers-container');
        const performerId = performerCounter++;
        const entry = document.createElement('div');
        entry.className = 'performer-entry';
        entry.setAttribute('data-performer-id', performerId);
        entry.style.marginBottom = '15px';
        entry.innerHTML = `
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label>Имя исполнителя</label>
                    <input type="text" name="performer_name[]" placeholder="Например: Т.Д. Костеркин" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Этнос</label>
                    <select name="performer_ethnos[]" class="ethnos-select" onchange="handleEthnosChange(this, ${performerId})">
                        <option value="">Выберите этнос</option>
                        ${vocabularyData.ethnos.map(e => `<option value="${e.name}">${e.name}</option>`).join('')}
                        <option value="new">➕ Создать новый...</option>
                    </select>
                    <div class="new-ethnos-container" style="display: none; margin-top: 5px;">
                        <div class="new-item-input">
                            <input type="text" class="new-ethnos-input" placeholder="Введите название нового этноса">
                            <button type="button" onclick="addNewEthnos(this, ${performerId})" class="btn-add-new">Добавить</button>
                        </div>
                    </div>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Форма исполнения</label>
                    <select name="performer_performance_form[]" class="performance-form-select" onchange="handlePerformanceFormChange(this, ${performerId})">
                        <option value="">Выберите форму</option>
                        <option value="vocal">Вокальная</option>
                        <option value="instrumental">Инструментальная</option>
                        <option value="vocal_instrumental">Вокально-инструментальная</option>
                    </select>
                </div>
                <button type="button" onclick="removePerformer(this)" class="btn-remove" style="width: 36px; height: 36px; margin-top: 24px;">✖</button>
            </div>
            <div id="instruments-section-${performerId}" style="display: none; margin-top: 10px;">
                <div class="form-group">
                    <label>Музыкальные инструменты</label>
                    <div id="instruments-container-${performerId}" class="instruments-container"></div>
                    <button type="button" onclick="addInstrument(${performerId})" class="btn-add" style="margin-top: 5px;">+ Добавить инструмент</button>
                </div>
            </div>
        `;
        container.appendChild(entry);
    }

    function removePerformer(btn) {
        if (document.querySelectorAll('.performer-entry').length > 1) {
            btn.closest('.performer-entry').remove();
        } else {
            toast('Должен быть хотя бы один исполнитель', 'err');
        }
    }

    function handleEthnosChange(select, performerId) {
        const container = select.closest('.form-group').querySelector('.new-ethnos-container');
        if (container) container.style.display = select.value === 'new' ? 'block' : 'none';
    }

    function handlePerformanceFormChange(select, performerId) {
        const instrumentsSection = document.getElementById(`instruments-section-${performerId}`);
        const value = select.value;
        if (value === 'instrumental' || value === 'vocal_instrumental') {
            if (instrumentsSection) instrumentsSection.style.display = 'block';
            const container = document.getElementById(`instruments-container-${performerId}`);
            if (container && container.children.length === 0) {
                addInstrument(performerId);
            }
        } else {
            if (instrumentsSection) instrumentsSection.style.display = 'none';
        }
    }

    async function addNewEthnos(button, performerId) {
        const container = button.closest('.new-ethnos-container');
        const input = container.querySelector('.new-ethnos-input');
        const name = input.value.trim();
        if (!name) {
            toast('Введите название этноса', 'err');
            return;
        }
        try {
            const response = await fetch('/api/add_to_vocabulary', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({category: 'ethnos', name})
            });
            const result = await response.json();
            if (result.status === 'success') {
                vocabularyData.ethnos.push({name});
                const select = button.closest('.performer-entry').querySelector('.ethnos-select');
                updateEthnosSelect(select);
                select.value = name;
                container.style.display = 'none';
                input.value = '';
                toast(`✅ Добавлен новый этнос: ${name}`, 'ok');
            } else {
                toast('Ошибка при добавлении: ' + (result.error || 'Неизвестная ошибка'), 'err');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            toast('Произошла ошибка при добавлении', 'err');
        }
    }

    function addInstrument(performerId) {
        const container = document.getElementById(`instruments-container-${performerId}`);
        if (!container) return;
        const emptyMsg = container.querySelector('.empty-instruments-msg');
        if (emptyMsg) emptyMsg.remove();
        const entry = document.createElement('div');
        entry.className = 'instrument-entry';
        entry.style.marginBottom = '5px';
        entry.innerHTML = `
            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="flex: 1;">
                    <select name="performer_instrument_name_${performerId}[]" class="instrument-select" onchange="handleInstrumentChange(this, ${performerId})" style="width: 100%;">
                        <option value="">Выберите инструмент</option>
                        ${vocabularyData.instruments.map(i => `<option value="${i.name}">${i.name}</option>`).join('')}
                        <option value="new">➕ Создать новый...</option>
                    </select>
                    <div class="new-instrument-container" style="display: none; margin-top: 5px;">
                        <div class="new-item-input" style="display: flex; gap: 5px;">
                            <input type="text" class="new-instrument-input" placeholder="Введите название нового инструмента" style="flex: 1;">
                            <button type="button" onclick="addNewInstrument(this, ${performerId})" class="btn-add-new">Добавить</button>
                        </div>
                    </div>
                </div>
                <button type="button" onclick="removeInstrument(this, ${performerId})" class="btn-remove" style="width: 30px; height: 30px;">✖</button>
            </div>
        `;
        container.appendChild(entry);
    }

    function removeInstrument(btn, performerId) {
        const entry = btn.closest('.instrument-entry');
        if (entry) entry.remove();
        const container = document.getElementById(`instruments-container-${performerId}`);
        if (container && container.children.length === 0) {
            container.innerHTML = '<div class="empty-instruments-msg form-hint" style="padding: 5px; color: #999; font-size: 12px;">Инструменты не добавлены</div>';
        }
    }

    function handleInstrumentChange(select, performerId) {
        const container = select.closest('.instrument-entry').querySelector('.new-instrument-container');
        if (container) container.style.display = select.value === 'new' ? 'block' : 'none';
    }

    async function addNewInstrument(button, performerId) {
        const container = button.closest('.new-instrument-container');
        const input = container.querySelector('.new-instrument-input');
        const name = input.value.trim();
        if (!name) {
            toast('Введите название инструмента', 'err');
            return;
        }
        try {
            const response = await fetch('/api/add_to_vocabulary', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({category: 'instruments', name: name})
            });
            const result = await response.json();
            if (result.status === 'success') {
                vocabularyData.instruments.push({name: name});
                refreshAllInstrumentSelects();
                const select = button.closest('.instrument-entry').querySelector('.instrument-select');
                if (select) select.value = name;
                container.style.display = 'none';
                input.value = '';
                toast(`✅ Добавлен новый инструмент: ${name}`, 'ok');
            } else {
                toast('Ошибка при добавлении: ' + (result.error || 'Неизвестная ошибка'), 'err');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            toast('Произошла ошибка при добавлении', 'err');
        }
    }

    function validateDuration(duration) {
        if (!duration || duration.trim() === '') return true;
        const pattern = /^([0-9]{1,2}:)?[0-5]?[0-9]:[0-5][0-9]$/;
        if (!pattern.test(duration)) return false;
        const parts = duration.split(':');
        if (parts.length === 2) {
            const minutes = parseInt(parts[0], 10);
            const seconds = parseInt(parts[1], 10);
            if (minutes > 599) return false;
            if (seconds > 59) return false;
        } else if (parts.length === 3) {
            const hours = parseInt(parts[0], 10);
            const minutes = parseInt(parts[1], 10);
            const seconds = parseInt(parts[2], 10);
            if (hours > 99) return false;
            if (minutes > 59 || seconds > 59) return false;
        }
        return true;
    }

    document.getElementById('add-recording-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const durationInput = document.getElementById('duration');
        const duration = durationInput.value;
        if (!validateDuration(duration)) {
            toast('Неверный формат длительности!\nИспользуйте ММ:СС или ЧЧ:ММ:СС', 'err');
            return;
        }
        const formData = new FormData(e.target);
        const performers = [];
        const performerNames = formData.getAll('performer_name[]');
        const performerEthnos = formData.getAll('performer_ethnos[]');
        const performerPerformanceForms = formData.getAll('performer_performance_form[]');
        for (let i = 0; i < performerNames.length; i++) {
            if (performerNames[i] && performerNames[i].trim()) {
                let ethnos = performerEthnos[i];
                if (ethnos === 'new') ethnos = '';
                const instruments = [];
                const instrumentNames = formData.getAll(`performer_instrument_name_${i}[]`);
                for (let j = 0; j < instrumentNames.length; j++) {
                    if (instrumentNames[j] && instrumentNames[j] !== 'new' && instrumentNames[j] !== '') {
                        instruments.push({name: instrumentNames[j].trim()});
                    }
                }
                performers.push({
                    name: performerNames[i].trim(),
                    ethnos: ethnos || null,
                    performance_form: performerPerformanceForms[i] || '',
                    instruments: instruments
                });
            }
        }
        const localTermsStr = formData.get('local_terms') || '';
        const localTerms = localTermsStr.split(',').map(t => t.trim()).filter(t => t);
        let genre = formData.get('genre');
        if (genre === 'new') genre = '';
        let location = formData.get('location');
        if (location === 'new') location = '';
        let collection = formData.get('collection');
        if (collection === 'new') collection = '';
        const data = {
            title: formData.get('title'),
            inventory_number: formData.get('inventory_number'),
            recording_date: formData.get('recording_date'),
            duration: duration,
            performers: performers,
            genre: genre,
            ethical_status: formData.get('ethical_status'),
            location: location,
            collection: collection,
            local_terms: localTerms,
            description: formData.get('description')
        };
        try {
            const response = await fetch('/api/add_recording', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.status === 'success') {
                toast('Запись успешно добавлена!', 'ok');
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                toast('Ошибка при добавлении: ' + result.message, 'err');
            }
        } catch (error) {
            console.error('Error:', error);
            toast('Произошла ошибка при сохранении', 'err');
        }
    });
</script>
</body>
</html>
