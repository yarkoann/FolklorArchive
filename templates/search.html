<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расширенный поиск - Фонограммархив АГИКИ</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔍 Расширенный поиск</h1>
            <a href="/" class="back-link">← Вернуться на главную</a>
        </header>

        <div class="advanced-search-form">
            <form id="advanced-search-form" onsubmit="performAdvancedSearch(); return false;">
                <div class="form-section">
                    <h3>Текстовый поиск</h3>

                    <div class="form-group">
                        <label for="search-title">Название</label>
                        <input type="text" id="search-title" name="title" placeholder="Введите название...">
                    </div>

                    <div class="form-group">
                        <label for="search-performer">Исполнитель</label>
                        <input type="text" id="search-performer" name="performer" placeholder="Имя исполнителя...">
                    </div>

                    <div class="form-group">
                        <label for="search-description">Описание</label>
                        <input type="text" id="search-description" name="description" placeholder="Ключевые слова из описания...">
                    </div>
                </div>

                <div class="form-section">
                    <h3>Фильтры</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="search-ethnos">Этнос</label>
                            <select id="search-ethnos" name="ethnos">
                                <option value="">Любой</option>
                                <option value="Чукчи">Чукчи</option>
                                <option value="Нганасаны">Нганасаны</option>
                                <option value="Энцы">Энцы</option>
                                <option value="Эвенки">Эвенки</option>
                                <option value="Якуты">Якуты</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="search-genre">Жанр</label>
                            <select id="search-genre" name="genre">
                                <option value="">Любой</option>
                                <option value="Горлохрипение">Горлохрипение</option>
                                <option value="Личная песня">Личная песня</option>
                                <option value="Шаманский обряд">Шаманский обряд</option>
                                <option value="Колыбельная">Колыбельная</option>
                                <option value="Эпическое сказание">Эпическое сказание</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="search-status">Этический статус</label>
                            <select id="search-status" name="status">
                                <option value="">Любой</option>
                                <option value="публичный_доступ">Публичный доступ</option>
                                <option value="ограниченный_доступ">Ограниченный доступ</option>
                                <option value="требует_согласия_общины">Требует согласия общины</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="search-location">Локация</label>
                            <input type="text" id="search-location" name="location" placeholder="Место записи...">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="search-year-from">Год от</label>
                            <input type="number" id="search-year-from" name="year_from" min="1900" max="2025" placeholder="1900">
                        </div>

                        <div class="form-group">
                            <label for="search-year-to">Год до</label>
                            <input type="number" id="search-year-to" name="year_to" min="1900" max="2025" placeholder="2025">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Локальные термины</h3>

                    <div class="form-group">
                        <label for="search-local-terms">Поиск по местным терминам</label>
                        <input type="text" id="search-local-terms" name="local_terms"
                               placeholder="Например: пилгэйнгэн, мәнә бәлы, ситабы, Мэдодэ">
                        <small class="form-hint">Введите термины через запятую</small>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">🔍 Выполнить поиск</button>
                    <button type="button" onclick="resetAdvancedSearch()" class="btn-secondary">🔄 Сбросить</button>
                </div>
            </form>
        </div>

        <div class="search-results" id="search-results" style="display: none;">
            <h3>Результаты поиска</h3>
            <div class="results-header">
                <span id="results-count">Найдено записей: 0</span>
                <select id="sort-select" onchange="sortAdvancedResults()">
                    <option value="title">По названию</option>
                    <option value="date_desc">Сначала новые</option>
                    <option value="date_asc">Сначала старые</option>
                </select>
            </div>
            <div id="results-list" class="results-grid"></div>
        </div>
    </div>

    <script>
        async function performAdvancedSearch() {
            const formData = new FormData(document.getElementById('advanced-search-form'));
            const params = new URLSearchParams();

            // Добавляем все заполненные поля
            for (let [key, value] of formData.entries()) {
                if (value) {
                    params.append(key, value);
                }
            }

            // Показываем индикатор загрузки
            document.getElementById('search-results').style.display = 'block';
            document.getElementById('results-list').innerHTML =
                '<div class="loading"><div class="loading-spinner"></div><p>Поиск...</p></div>';

            try {
                const response = await fetch(`/api/advanced_search?${params.toString()}`);
                const data = await response.json();

                document.getElementById('results-count').textContent = `Найдено записей: ${data.total || 0}`;
                displayResults(data.results || []);
            } catch (error) {
                console.error('Search error:', error);
                document.getElementById('results-list').innerHTML =
                    '<div class="error">Ошибка при выполнении поиска</div>';
            }
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results-list');

            if (!results || results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                return;
            }

            let html = '';
            results.forEach(recording => {
                const statusClass = getStatusClass(recording.status);
                const statusName = getStatusName(recording.status);

                html += `
                    <div class="result-card" onclick="location.href='/recording/${recording.id}'">
                        <div class="result-title">${escapeHtml(recording.title)}</div>
                        <div class="result-meta">
                            <span class="meta-item">📅 ${recording.date || 'Дата неизвестна'}</span>
                            <span class="meta-item">🕐 ${recording.duration || 'Длительность неизвестна'}</span>
                            <span class="meta-item">🎤 ${escapeHtml(recording.performer || 'Неизвестен')}</span>
                            <span class="meta-item">🌍 ${escapeHtml(recording.ethnos || 'Не указан')}</span>
                        </div>
                        <div class="result-meta">
                            <span class="meta-item">🎵 ${escapeHtml(recording.genre || 'Жанр не указан')}</span>
                            <span class="status-badge ${statusClass}">${statusName}</span>
                        </div>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        function getStatusClass(status) {
            if (!status) return 'status-public';
            if (status.includes('публичный')) return 'status-public';
            if (status.includes('ограниченный')) return 'status-restricted';
            return 'status-community';
        }

        function getStatusName(status) {
            if (!status) return 'Публичный';
            if (status.includes('публичный')) return 'Публичный';
            if (status.includes('ограниченный')) return 'Ограниченный';
            if (status.includes('согласия')) return 'Требует согласия';
            return status;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function resetAdvancedSearch() {
            document.getElementById('advanced-search-form').reset();
            document.getElementById('search-results').style.display = 'none';
        }

        function sortAdvancedResults() {
            // Здесь можно добавить логику сортировки
            performAdvancedSearch();
        }
    </script>
</body>
</html>
